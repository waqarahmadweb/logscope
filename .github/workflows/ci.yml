name: CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    php-lint:
        name: PHP lint (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['8.0', '8.1', '8.2', '8.3', '8.4']
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  tools: composer:v2
                  coverage: none

            - name: Install composer dependencies
              uses: ramsey/composer-install@v3

            - name: Run phpcs
              run: composer lint

    js-lint:
        name: JS lint + build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint JS
              run: pnpm lint:js

            - name: Build
              run: pnpm build

    audit:
        name: Dependency audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
                  coverage: none

            - name: Composer audit
              run: composer audit --locked

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install JS dependencies
              run: pnpm install --frozen-lockfile

            - name: pnpm audit
              run: pnpm audit --audit-level=high --prod

    plugin-check:
        name: wp.org Plugin Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
                  coverage: none

            # Plugin Check activates the plugin; without runtime deps the
            # autoloader require in logscope.php fatals. Ship prod deps only.
            - name: Install composer dependencies (prod)
              run: composer install --no-dev --no-interaction --prefer-dist

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install JS dependencies
              run: pnpm install --frozen-lockfile

            - name: Build plugin assets
              run: pnpm build

            # Assemble the exact tree that ships to wp.org: `git archive`
            # honours `.gitattributes export-ignore` (drops tests, .github,
            # dev dotfiles, AGENTS/CLAUDE/ROADMAP, etc.), then we layer in the
            # built assets and prod-only vendor that are gitignored. The dir
            # MUST be named after the slug (`logscope`): Plugin Check derives
            # the expected text domain from the directory name, so a generic
            # `dist/` would flag every translated string as a domain mismatch.
            # composer.json rides along so the shipped vendor/ has its manifest.
            - name: Assemble distribution
              run: |
                  mkdir -p build/logscope
                  git archive --format=tar HEAD | tar -x -C build/logscope
                  cp -r vendor build/logscope/vendor
                  cp composer.json build/logscope/composer.json
                  mkdir -p build/logscope/assets
                  cp -r assets/build build/logscope/assets/build

            - name: Run wp.org Plugin Check
              uses: WordPress/plugin-check-action@v1
              with:
                  build-dir: 'build/logscope'
                  # Errors block the build; warnings stay visible in the log
                  # but don't fail it — the one remaining warning is the
                  # false-positive `logscope/email` slash-hook prefix.
                  ignore-warnings: true
                  categories: |
                      plugin_repo
                      security
